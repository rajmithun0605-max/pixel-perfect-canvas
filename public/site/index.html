<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Chrona — a personal time capsule. Write letters to your future self, seal memories, and rediscover them when the time is right." />
  <meta name="theme-color" content="#faf7f2" />
  <meta property="og:title" content="Chrona — Letters to your future self" />
  <meta property="og:description" content="A quiet home for your memories. Seal them today, open them tomorrow." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Chrona — Letters to your future self</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <!-- Ambient layers -->
  <div class="aurora" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="cursor-glow" aria-hidden="true"></div>


  <div id="loader" class="loader" aria-hidden="true">
    <div class="loader__ink">
      <svg viewBox="0 0 100 100" width="80" height="80" aria-hidden="true">
        <circle cx="50" cy="50" r="6" class="ink-drop" />
        <circle cx="50" cy="50" r="20" class="ink-ring" />
      </svg>
    </div>
    <p class="loader__text">Opening your archive…</p>
  </div>

  <!-- Nav -->
  <header class="nav" role="banner">
    <a href="#/" class="nav__logo" aria-label="Chrona home">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 6v6l4 2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>Chrona</span>
    </a>
    <nav class="nav__links" aria-label="Primary">
      <a href="#/" data-route="/">Home</a>
      <a href="#/timeline" data-route="/timeline">Timeline</a>
      <a href="#/new" data-route="/new">New</a>
      <a href="#/about" data-route="/about">About</a>
    </nav>
    <div class="nav__actions">
      <button id="search-toggle" class="icon-btn" aria-label="Search (press /)" title="Search (/)">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.7"/><g stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></g></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </header>

  <!-- Search overlay -->
  <div id="search-overlay" class="search-overlay" hidden>
    <div class="search-overlay__panel" role="dialog" aria-label="Search capsules">
      <input id="search-input" type="search" placeholder="Search your memories…" autocomplete="off" />
      <div id="search-results" class="search-results" aria-live="polite"></div>
      <p class="search-hint">Press <kbd>Esc</kbd> to close · <kbd>/</kbd> to open · <kbd>N</kbd> new capsule</p>
    </div>
  </div>

  <!-- Main content — pages are swapped by scripts/main.js -->
  <main id="app" class="app" tabindex="-1"></main>

  <!-- Footer -->
  <footer class="footer">
    <div>
      <span>Chrona</span> · Built for the Frontend Web Development Competition 2026
    </div>
    <div class="footer__links">
      <a href="#/about">About</a>
      <button id="export-btn" class="linkish">Export</button>
      <label for="import-input" class="linkish">Import</label>
      <input id="import-input" type="file" accept="application/json" hidden />
    </div>
  </footer>

  <!-- Modal (capsule detail) -->
  <div id="modal" class="modal" hidden aria-hidden="true">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal__close icon-btn" data-close aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Page templates -->
  <template id="tpl-home">
    <section class="hero">
      <div class="hero__eyebrow">a personal time capsule</div>
      <h1 class="hero__title">
        <span class="hero__word" style="animation-delay:.05s">Write</span>
        <span class="hero__word" style="animation-delay:.15s">a</span>
        <span class="hero__word" style="animation-delay:.25s">letter</span>
        <span class="hero__word" style="animation-delay:.35s">to</span>
        <span class="hero__word" style="animation-delay:.45s">the</span>
        <br />
        <span class="hero__word" style="animation-delay:.55s"><em>you</em></span>
        <span class="hero__word" style="animation-delay:.65s">that</span>
        <span class="hero__word" style="animation-delay:.75s">hasn't</span>
        <span class="hero__word" style="animation-delay:.85s">happened</span>
        <span class="hero__word" style="animation-delay:.95s">yet.</span>
      </h1>
      <p class="hero__lede">
        Chrona is a quiet home for the thoughts, photos, and small moments you'd
        like to rediscover — sealed today, opened when the time is right.
      </p>
      <div class="hero__cta">
        <a href="#/new" class="btn btn--primary" data-magnetic>Seal a capsule →</a>
        <a href="#/timeline" class="btn btn--ghost" data-magnetic>Open your archive</a>
      </div>
      <div class="hero__marquee" aria-hidden="true">
        <div>
          <span>slow down</span><span>write honestly</span><span>seal it away</span>
          <span>rediscover</span><span>past you speaks</span><span>future you listens</span>
          <span>slow down</span><span>write honestly</span><span>seal it away</span>
          <span>rediscover</span><span>past you speaks</span><span>future you listens</span>
        </div>
      </div>
    </section>


    <section class="steps reveal">
      <h2 class="section-title">How it works</h2>
      <div class="steps__grid">
        <article class="step">
          <div class="step__num">01</div>
          <h3>Write</h3>
          <p>Draft a letter, a memory, or a private note. Add tags to find it later.</p>
        </article>
        <article class="step">
          <div class="step__num">02</div>
          <h3>Seal</h3>
          <p>Pick a date. The capsule stays sealed — a soft countdown until it opens.</p>
        </article>
        <article class="step">
          <div class="step__num">03</div>
          <h3>Rediscover</h3>
          <p>When the day comes, break the seal and read what past you had to say.</p>
        </article>
      </div>
    </section>

    <section class="sample reveal">
      <h2 class="section-title">A glimpse</h2>
      <div class="sample__card">
        <div class="sample__meta">
          <span class="badge">sealed</span>
          <span>opens · 12 Aug 2027</span>
        </div>
        <p class="sample__body">
          "Whatever you're stressing about right now — the exam, the argument, the
          uncertainty — you handled it. You always do. Be kinder to yourself this year."
        </p>
        <div class="sample__foot">— to future me · tagged <em>reminders</em></div>
      </div>
    </section>
  </template>

  <template id="tpl-timeline">
    <section class="timeline-page">
      <header class="timeline-page__head">
        <div>
          <h1>Your archive</h1>
          <p id="tl-count" class="muted">—</p>
        </div>
        <div class="timeline-page__actions">
          <div class="chips" id="tl-filters">
            <button class="chip is-active" data-filter="all">All</button>
            <button class="chip" data-filter="sealed">Sealed</button>
            <button class="chip" data-filter="open">Open</button>
          </div>
          <a href="#/new" class="btn btn--primary btn--sm">+ New capsule</a>
        </div>
      </header>
      <div id="timeline" class="timeline"></div>
      <div id="empty" class="empty" hidden>
        <svg viewBox="0 0 120 120" width="140" height="140" aria-hidden="true">
          <circle cx="60" cy="60" r="48" fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3 5"/>
          <path d="M40 65 Q60 45 80 65" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="50" cy="52" r="1.8" fill="currentColor"/>
          <circle cx="70" cy="52" r="1.8" fill="currentColor"/>
        </svg>
        <h3>No capsules yet</h3>
        <p>Write your first letter — even a short one counts.</p>
        <a href="#/new" class="btn btn--primary">Start a capsule</a>
      </div>
    </section>
  </template>

  <template id="tpl-new">
    <section class="new-page">
      <h1>New capsule</h1>
      <p class="muted">Take your time. Nothing sends. Nothing syncs. It's just for you.</p>

      <ol class="stepper" id="stepper">
        <li class="is-active"><span>1</span> Write</li>
        <li><span>2</span> Attach</li>
        <li><span>3</span> Seal</li>
      </ol>

      <form id="new-form" class="form" novalidate>
        <!-- Step 1 -->
        <fieldset class="step-panel is-active" data-step="1">
          <label class="field">
            <span class="field__label">Title</span>
            <input name="title" type="text" maxlength="80" placeholder="A note about today" required />
            <span class="field__error" data-error></span>
          </label>
          <label class="field">
            <span class="field__label">Your letter</span>
            <textarea name="body" rows="8" placeholder="Dear future me…" required minlength="20"></textarea>
            <span class="field__error" data-error></span>
            <span class="field__hint"><span id="char-count">0</span> characters · min 20</span>
          </label>
          <label class="field">
            <span class="field__label">Tags <span class="muted">(comma separated)</span></span>
            <input name="tags" type="text" placeholder="reminders, gratitude, goals" />
          </label>
        </fieldset>

        <!-- Step 2 -->
        <fieldset class="step-panel" data-step="2">
          <div class="dropzone" id="dropzone" tabindex="0">
            <input id="file-input" type="file" accept="image/*" multiple hidden />
            <p><strong>Drop images here</strong> or <button type="button" id="browse-btn" class="linkish">browse</button></p>
            <p class="muted small">Stored locally in your browser. Keep it under a few MB.</p>
          </div>
          <div id="thumbs" class="thumbs"></div>
        </fieldset>

        <!-- Step 3 -->
        <fieldset class="step-panel" data-step="3">
          <label class="field">
            <span class="field__label">Unseal date</span>
            <input name="unsealAt" type="date" required />
            <span class="field__error" data-error></span>
            <span class="field__hint">Pick any future date. Or today, to keep it open.</span>
          </label>
          <label class="field field--check">
            <input name="confirm" type="checkbox" required />
            <span>I understand this capsule is stored only in this browser.</span>
            <span class="field__error" data-error></span>
          </label>
          <div class="preview-card">
            <div class="preview-card__label">Preview</div>
            <h3 id="pv-title" class="preview-card__title">Untitled</h3>
            <p id="pv-body" class="preview-card__body muted">Your letter will appear here.</p>
            <div id="pv-meta" class="preview-card__meta muted"></div>
          </div>
        </fieldset>

        <div class="form__actions">
          <button type="button" id="prev-btn" class="btn btn--ghost" disabled>Back</button>
          <button type="button" id="next-btn" class="btn btn--primary">Next</button>
          <button type="submit" id="submit-btn" class="btn btn--primary" hidden>Seal capsule</button>
        </div>
      </form>
    </section>
  </template>

  <template id="tpl-about">
    <section class="about">
      <h1>About Chrona</h1>
      <p class="lede">
        A small, deliberate app about slowing down. Written in plain HTML, CSS and
        JavaScript — no frameworks, no tracking, no accounts. Your words stay on
        your device.
      </p>

      <div class="about__grid">
        <div>
          <h3>Why</h3>
          <p>We spend our days reacting. Chrona is a place to pause and speak to a future self — a small ritual for perspective.</p>
        </div>
        <div>
          <h3>How it's built</h3>
          <p>Semantic HTML, hand-rolled CSS with custom properties, and modular vanilla JS. Data lives in <code>localStorage</code>. Routing is hash-based.</p>
        </div>
        <div>
          <h3>Accessibility</h3>
          <p>Keyboard-navigable, respects <code>prefers-reduced-motion</code>, focus rings visible, ARIA where it counts.</p>
        </div>
        <div>
          <h3>Shortcuts</h3>
          <ul class="kbds">
            <li><kbd>/</kbd> search</li>
            <li><kbd>N</kbd> new capsule</li>
            <li><kbd>G</kbd> then <kbd>T</kbd> timeline</li>
            <li><kbd>Esc</kbd> close overlays</li>
          </ul>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-404">
    <section class="notfound">
      <h1>404</h1>
      <p>This memory doesn't exist yet.</p>
      <a href="#/" class="btn btn--primary">Back home</a>
    </section>
  </template>

  <script type="module" src="scripts/main.js"></script>
</body>
</html>
